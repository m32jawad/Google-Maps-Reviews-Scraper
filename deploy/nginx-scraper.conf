# nginx site for the reviews-finder API.
#
# 1. Replace scraper.example.com with your real domain (DNS A-record -> server IP).
# 2. Copy:    sudo cp deploy/nginx-scraper.conf /etc/nginx/sites-available/scraper.conf
# 3. Enable:  sudo ln -s /etc/nginx/sites-available/scraper.conf /etc/nginx/sites-enabled/
# 4. Test:    sudo nginx -t && sudo systemctl reload nginx
# 5. TLS:     sudo certbot --nginx -d scraper.example.com
#             (certbot rewrites this file to add the 443 server block + redirect)

server {
    listen 80;
    server_name scraper.example.com;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # /results for a big place can be tens of MB and take a moment to
        # serialize -- don't buffer it to disk, and allow slow reads.
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
